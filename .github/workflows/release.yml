name: goreleaser

on:
  push:
    tags:
      - "*"
      - "!*-nightly*"
  workflow_dispatch:
    inputs:
      aviator_deployment_id:
        description: "Database ID of deployment"
        required: false
        type: string
      aviator_release_cut_commit_hash:
        description: "Commit SHA, branch name, or tag of the HEAD to be built"
        required: false
        type: string
      aviator_release_candidate_version:
        description: "Name of the version (e.g., 0.2.0)"
        required: false
        type: string

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: "write"
    steps:
      - uses: fjogeleit/http-request-action@551353b829c3646756b2ec2b3694f819d7957495 # v2
        if: github.event_name == 'workflow_dispatch' && inputs.aviator_deployment_id != ''
        with:
          url: '${{ vars.AVIATOR_API_HOST }}/api/v1/sync-deploy-github-action'
          method: 'POST'
          bearerToken: ${{ secrets.AVIATOR_API_TOKEN }}
          data: '{"deployment_id": "${{ inputs.aviator_deployment_id }}", "workflow_run_id": "${{ github.run_id }}"}'
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: "${{ inputs.aviator_release_cut_commit_hash || github.ref }}"
          fetch-depth: 0
          persist-credentials: false
      - name: fetch tags
        run: git fetch --force --tags
      - name: create release tag
        if: github.event_name == 'workflow_dispatch' && inputs.aviator_release_candidate_version != ''
        env:
          VERSION: ${{ inputs.aviator_release_candidate_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git tag "v${VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "v${VERSION}"
      - name: install go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ inputs.aviator_release_candidate_version && format('v{0}', inputs.aviator_release_candidate_version) || github.ref_name }}
          AVIATOR_CO_HOMEBREW_REPO_SSH_KEY: ${{ secrets.AVIATOR_CO_HOMEBREW_REPO_SSH_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FURY_TOKEN: ${{ secrets.FURY_PUSH_TOKEN }}
